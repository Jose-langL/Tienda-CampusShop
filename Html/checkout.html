<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/base.css">
    <link rel="stylesheet" href="/CSS/components.css">
    <link rel="stylesheet" href="/CSS/layout.css">
    <link rel="stylesheet" href="">
    <title>Document</title>
</head>

<body>
    <header class="header">
        <a href="carrito.html"><img src="/Imagenes/Iconos/arrow-left-stroke.svg" alt="Regresar"></a>
        <h1>Checkout</h1>
    </header>

    <section>
        <div class="Checkout">
        <form action="">
            <h1>Envio</h1>
            <div class="input-group">
                <label for="nombre">Nombre Completo</label><br>
                <div class="info-checkout">
                    <input type="text" name="nombre" id="nombre" placeholder="Ingresa tu nombre completo">
                </div>
                <label for="direccion">Dirección</label><br>
                <div class="info-checkout">
                    <input type="text" name="direccion" id="direccion" placeholder="Ingresa tu dirección">
                </div>
                <label for="Ciudad">Ciudad</label><br>
                <div class="info-checkout">
                    <input type="text" name="Ciudad" id="Ciudad" placeholder="Ingresa tu ciudad">
                </div>
            </div>
        </form> <br>
        </div>

        <div class="metodo">
        <h1>Método de pago</h1>
        <div class="metodo-opciones">
            <div class="metodo-pago">
                <img src="/Imagenes/Iconos/credit-card-alt.svg" alt="Tarjeta Credito">
                Master
            </div>
            <div class="metodo-pago">
                <img src="/Imagenes/Iconos/credit-card.svg" alt="Tarjeta Visa">
                Visa
            </div>
            <div class="metodo-pago">
                <img src="/Imagenes/Iconos/receipt.svg" alt="Paypal">
                Paypal
            </div>
        </div>
    </div>


        <br>
        <div class="tarjeta-resumen">
            <img src="/Imagenes/Camisas/CMS1VD.png" alt="Camisa Verde">
            <div class="Productos-checkout">
                <p>Camisa</p>
                <p>Cantidad: 1</p>
            </div>
            <div class="Cobro" id="Cobro-Checkout">
                <span>$96.49</span>
            </div>
        </div>

        <div class="tarjeta-resumen">
            <img src="/Imagenes/Chaqueta/SDS1CL.png" alt="Sudadera Celetes">
            <div class="Productos-checkout">
                <p>Sudadero</p>
                <p>Cantidad: 1</p>
            </div>
            <div class="Cobro" id="Cobro-Checkout">
                <span>$96.49</span>
            </div>
        </div>

        <div class="tarjeta-resumen">
            <img src="/Imagenes/Pantalon/PLS1ZL.png" alt="Pantalon Azul">
            <div class="Productos-checkout">
                <p>Pantalon</p>
                <p>Cantidad: 1</p>
            </div>
            <div class="Cobro" id="Cobro-Checkout">
                <span>$96.49</span>
            </div>
        </div>

        <hr>
            <div class="Total-Checkout">
            <p>Total</p>
            <span id="Total">$333.00</span>
            </div>

        <input type="checkbox" id="activar" style="display: none;">
        <section>
        <label for="activar" class="Btn-General">
        Pagar $333.00
        </label>
        </section>

        <div class="modal-overlay">
        <div class="modal-content">
        <div class="icono-check">
            <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" alt="Éxito">
        </div>
        <h1>¡PAGO EXITOSO!</h1>
        <p class="mensaje-detalle">
            Tu método de pago ha sido procesado correctamente.
        </p>
        
        <label for="activar" class="btn-finalizar">
            FINALIZAR
        </label>
        </div>
        </div>
    </section>
</body>

</html>
